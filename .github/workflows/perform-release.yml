name: perform-release

# Must be triggered from main.
# bump package.json version → commit → tag → create GitHub Release.
# Publishing to npm is handled by package.yml (on: release published).

on:
  workflow_dispatch:
    inputs:
      bump:
        description: 'Version bump'
        type: choice
        default: patch
        options:
          - patch
          - minor
          - major

jobs:
  git-release:
    name: Bump version, tag and create release
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Validate branch name
        run: |
          if [[ "${{ github.ref_name }}" != "main" ]]; then
            echo "::error::This workflow must be triggered from main (got: ${{ github.ref_name }})"
            exit 1
          fi

      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: main

      - name: Configure git
        run: |
          git config user.name github-actions
          git config user.email github-actions@github.com

      - name: Bump version and tag
        id: version
        run: |
          NEW_VERSION="$(npm version ${{ inputs.bump }} -m "Release %s")"
          echo "new_version=$NEW_VERSION" >> "$GITHUB_OUTPUT"
          git push origin main --follow-tags

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NEW_VERSION: ${{ steps.version.outputs.new_version }}
        run: |
          gh release create "$NEW_VERSION" \
            --title "$NEW_VERSION" \
            --generate-notes
