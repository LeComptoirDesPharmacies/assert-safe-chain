name: perform-release

# Must be triggered from main.
# bump package.json version → commit → tag → create GitHub Release → publish to npm.

on:
  workflow_dispatch:
    inputs:
      bump:
        description: 'Version bump'
        type: choice
        default: patch
        options:
          - patch
          - minor
          - major

jobs:
  perform-release:
    name: Bump, tag, release and publish
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write  # Required for npm provenance (OIDC)
    steps:
      - name: Validate branch name
        run: |
          if [[ "${{ github.ref_name }}" != "main" ]]; then
            echo "::error::This workflow must be triggered from main (got: ${{ github.ref_name }})"
            exit 1
          fi

      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: main

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          registry-url: 'https://registry.npmjs.org'

      - name: Configure git
        run: |
          git config user.name github-actions
          git config user.email github-actions@github.com

      - name: Bump version and tag
        id: version
        run: |
          NEW_VERSION="$(npm version ${{ inputs.bump }} -m "Release %s")"
          echo "new_version=$NEW_VERSION" >> "$GITHUB_OUTPUT"
          git push origin main --follow-tags

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NEW_VERSION: ${{ steps.version.outputs.new_version }}
        run: |
          gh release create "$NEW_VERSION" \
            --title "$NEW_VERSION" \
            --generate-notes

      - name: Publish to npm
        run: npm publish --provenance --access public
